# MIG-optimized resource configuration for RAG Blueprint on NVIDIA H100 80GB.
# Pairs with mig-config-h100.yaml (profile: custom-h100-llm2full-embed1full-1x2g20-3x1g10-1x1g20).
#
# GPU layout (4×H100 node):
#   GPU 0,1 — MIG disabled, full devices            → nim-llm (nemotron-3-super-120b-a12b, vLLM tp=2)
#   GPU 2   — 1× 2g.20gb + 3× 1g.10gb + 1× 1g.20gb  → OCR + (graphic, page, table) + rerank
#   GPU 3   — MIG disabled, full device             → embedding-VLM
#
# Requires GPU Operator mig-strategy=mixed so the node advertises both
# nvidia.com/gpu and nvidia.com/mig-* resources simultaneously.

# Ingestor Server — reduce concurrency for MIG
ingestor-server:
  envVars:
    NV_INGEST_FILES_PER_BATCH: "4"
    NV_INGEST_CONCURRENT_BATCHES: "1"

# NV-Ingest configuration
nv-ingest:
  envVars:
    NV_INGEST_MAX_UTIL: 8
    MAX_INGEST_PROCESS_WORKERS: 2

  # NV-Ingest NIM Operator overrides
  nimOperator:
    # OCR — uses 2g.20gb on GPU 2
    ocr:
      resources:
        limits:
          nvidia.com/gpu: "0"
          nvidia.com/mig-2g.20gb: 1
        requests:
          nvidia.com/gpu: "0"
          nvidia.com/mig-2g.20gb: 1
      storage:
        pvc:
          storageClass: ""

    # Graphic Elements — uses 1g.10gb on GPU 2
    graphic_elements:
      resources:
        limits:
          nvidia.com/gpu: "0"
          nvidia.com/mig-1g.10gb: 1
        requests:
          nvidia.com/gpu: "0"
          nvidia.com/mig-1g.10gb: 1
      storage:
        pvc:
          storageClass: ""

    # Page Elements — uses 1g.10gb on GPU 2
    page_elements:
      resources:
        limits:
          nvidia.com/gpu: "0"
          nvidia.com/mig-1g.10gb: 1
        requests:
          nvidia.com/gpu: "0"
          nvidia.com/mig-1g.10gb: 1
      storage:
        pvc:
          storageClass: ""

    # Table Structure — uses 1g.10gb on GPU 2
    table_structure:
      resources:
        limits:
          nvidia.com/gpu: "0"
          nvidia.com/mig-1g.10gb: 1
        requests:
          nvidia.com/gpu: "0"
          nvidia.com/mig-1g.10gb: 1
      storage:
        pvc:
          storageClass: ""

# Main NIM Operator overrides for MIG
nimOperator:
  # LLM — 2 FULL H100 GPUs (no MIG).
  # nemotron-3-super-120b-a12b runs with vLLM and tensorParallelism=2,
  # which requires two physical GPUs with NVLink for NCCL collectives.
  nim-llm:
    resources:
      limits:
        nvidia.com/gpu: 2
      requests:
        nvidia.com/gpu: 2
    storage:
      pvc:
        storageClass: ""

  # VLM Embedding (default) — 1 FULL H100 GPU (no MIG) on GPU 3.
  # Promoted to a full device so the vision tower has unrestricted compute
  # and memory bandwidth, improving end-to-end embedding throughput.
  nvidia-nim-llama-nemotron-embed-vl-1b-v2:
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        nvidia.com/gpu: 1
    storage:
      pvc:
        storageClass: ""

  # Reranking — uses 1g.20gb on GPU 2.
  nvidia-nim-llama-32-nv-rerankqa-1b-v2:
    resources:
      limits:
        nvidia.com/gpu: "0"
        nvidia.com/mig-1g.20gb: 1
      requests:
        nvidia.com/gpu: "0"
        nvidia.com/mig-1g.20gb: 1
    storage:
      pvc:
        storageClass: ""
