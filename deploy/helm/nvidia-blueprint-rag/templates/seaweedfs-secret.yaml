{{- $cfg := .Values.seaweedfs -}}
{{- if and $cfg.enabled $cfg.allInOne.enabled $cfg.allInOne.s3.enabled (or $cfg.allInOne.s3.enableAuth $cfg.s3.enableAuth) (not $cfg.s3.existingConfigSecret) }}
{{- $creds := $cfg.s3.credentials | default dict -}}
{{- $admin := $creds.admin | default dict -}}
{{- $accessKey := required "seaweedfs.s3.credentials.admin.accessKey is required when SeaweedFS S3 auth is enabled" $admin.accessKey -}}
{{- $secretKey := required "seaweedfs.s3.credentials.admin.secretKey is required when SeaweedFS S3 auth is enabled" $admin.secretKey -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nvidia-blueprint-rag.seaweedfsFullname" . }}-s3-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvidia-blueprint-rag.seaweedfsLabels" . | nindent 4 }}
type: Opaque
stringData:
  admin_access_key_id: {{ $accessKey | quote }}
  admin_secret_access_key: {{ $secretKey | quote }}
  seaweedfs_s3_config: |-
    {"identities":[{"name":"default","credentials":[{"accessKey":"{{ $accessKey }}","secretKey":"{{ $secretKey }}"}],"actions":["Admin","Read","Write","List","Tagging"]}]}
{{- end }}
