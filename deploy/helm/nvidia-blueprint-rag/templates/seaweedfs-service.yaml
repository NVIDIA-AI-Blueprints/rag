{{- if .Values.seaweedfs.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nvidia-blueprint-rag.seaweedfsFullname" . }}
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.seaweedfs.service.type }}
  selector:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: s3
      port: {{ .Values.seaweedfs.service.s3Port }}
      targetPort: s3
    - name: console
      port: {{ .Values.seaweedfs.service.consolePort }}
      targetPort: console
{{- end }}
