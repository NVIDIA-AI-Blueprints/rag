{{- if and (hasKey .Values "oracle") (eq (default "" .Values.oracle.mode) "create") (default false .Values.oracle.createDatabase.enabled) }}
{{- if and .Values.oracle.auth.ociConfig .Values.oracle.auth.ociKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.oracle.auth.ociConfigSecret | default "oci-config" }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-25"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
data:
  config: {{ .Values.oracle.auth.ociConfig | b64enc }}
  oci_api_key.pem: {{ .Values.oracle.auth.ociKey | b64enc }}
{{- end }}
{{- end }}
