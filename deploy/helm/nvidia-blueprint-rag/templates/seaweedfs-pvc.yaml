{{- if and .Values.seaweedfs.enabled .Values.seaweedfs.persistence.enabled (not .Values.seaweedfs.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "nvidia-blueprint-rag.seaweedfsFullname" . }}-data
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
{{ toYaml .Values.seaweedfs.persistence.accessModes | indent 4 }}
  resources:
    requests:
      storage: {{ .Values.seaweedfs.persistence.size }}
  {{- if .Values.seaweedfs.persistence.storageClass }}
  storageClassName: {{ .Values.seaweedfs.persistence.storageClass }}
  {{- end }}
{{- end }}
