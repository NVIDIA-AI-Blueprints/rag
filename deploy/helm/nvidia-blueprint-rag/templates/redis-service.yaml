{{- $nvIngest := index .Values "nv-ingest" -}}
{{- $redis := $nvIngest.redis -}}
{{- if and $nvIngest.enabled $redis.enabled (not $nvIngest.redisDeployed) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nvidia-blueprint-rag.redisMasterName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nvidia-blueprint-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: {{ $redis.service.port | default 6379 }}
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "nvidia-blueprint-rag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- end }}
