name: NV-BASE Skill Eval

on:
  workflow_dispatch:
    inputs:
      agent:
        description: Agent adapter to use for NV-BASE Tier 3
        required: true
        default: claude-code
        type: choice
        options:
          - claude-code
      skip_baseline:
        description: Skip baseline run for faster smoke testing
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: nvbase-skill-eval-${{ github.ref }}
  cancel-in-progress: true

env:
  SKILL_DIR: ./skill-source/.agents/skills/rag-blueprint
  CLAUDE_CODE_DISABLE_THINKING: "1"
  NV_BASE_EVAL_TIMEOUT: "900"
  MILVUS_VERSION: v2.6.5
  DOCKER_VOLUME_DIRECTORY: /tmp/nvbase-rag-milvus
  INGESTOR_SERVER_EXTERNAL_VOLUME_MOUNT: /tmp/nvbase-ingestor-server-data
  APP_VECTORSTORE_ENABLEGPUSEARCH: "False"
  APP_VECTORSTORE_ENABLEGPUINDEX: "False"

jobs:
  nvbase-rag-blueprint-eval:
    name: RAG Blueprint Skill Eval
    runs-on: arc-runners-org-nvidia-ai-bp-2-gpu
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clean existing Docker state
        run: |
          docker info
          docker compose version
          docker ps -a || true
          docker stop $(docker ps -aq) || true
          docker rm $(docker ps -aq) || true

      - name: Install NV-BASE and Claude Code
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/uv/tools/nv-base/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$HOME/.local/share/uv/tools/nv-base/bin:$PATH"

          uv tool install nv-base \
            --index https://urm.nvidia.com/artifactory/api/pypi/nv-shared-pypi/simple

          npm install -g @anthropic-ai/claude-code

          nv-base --version
          nv-base health-check
          claude --version

      - name: Patch Claude Code env forwarding for NV-BASE 2.6.0 (KI-001)
        run: python3 ci/patch_nvbase.py

      - name: Strip allowed-tools from SKILL.md for headless eval (RAG-023)
        run: sed -i '/^allowed-tools:/d' skill-source/.agents/skills/rag-blueprint/SKILL.md

      - name: Docker login to NGC
        env:
          NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
          NVCR_API_KEY: ${{ secrets.CI_NVSTAGING_BLUEPRINT_KEY }}
        run: |
          LOGIN_KEY="${NVCR_API_KEY:-$NGC_API_KEY}"
          if [ -z "$LOGIN_KEY" ]; then
            echo "Set either CI_NVSTAGING_BLUEPRINT_KEY or NGC_API_KEY secret for nvcr.io login."
            exit 1
          fi
          echo "$LOGIN_KEY" | docker login nvcr.io -u '$oauthtoken' --password-stdin

      - name: Run NV-BASE Tier 3 eval
        env:
          NVIDIA_API_KEY: ${{ secrets.NVBASE_INFERENCE_API_KEY }}
          NVIDIA_INFERENCE_KEY: ${{ secrets.NVBASE_INFERENCE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.NVBASE_INFERENCE_API_KEY }}
          NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
        run: |
          if [ -z "$NVIDIA_INFERENCE_KEY" ]; then
            echo "Set NVBASE_INFERENCE_API_KEY secret to an sk- inference proxy key."
            exit 1
          fi
          if [ -z "$NGC_API_KEY" ]; then
            echo "Set NGC_API_KEY secret to an nvapi- key for RAG deployment."
            exit 1
          fi

          BASELINE_FLAG=""
          if [ "${{ inputs.skip_baseline }}" = "true" ]; then
            BASELINE_FLAG="--skip-baseline"
          fi

          nv-base agent-eval \
            --env-mode local \
            -a "${{ inputs.agent }}" \
            $BASELINE_FLAG \
            -k 1 \
            "$SKILL_DIR"

      - name: Collect NV-BASE and Docker logs
        if: always()
        run: |
          mkdir -p nvbase-ci-logs
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" > nvbase-ci-logs/docker-ps.log 2>&1 || true
          for container in rag-server ingestor-server milvus-standalone milvus-etcd milvus-minio; do
            docker logs "$container" > "nvbase-ci-logs/${container}.log" 2>&1 || true
          done

      - name: Upload NV-BASE results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nvbase-rag-blueprint-results-${{ github.sha }}
          path: |
            skill-source/.agents/skills/rag-blueprint/evals/results/
            nvbase-ci-logs/
          retention-days: 14

      - name: Cleanup Docker resources
        if: always()
        run: |
          docker compose -f deploy/compose/docker-compose-ingestor-server.yaml down -v --remove-orphans --rmi local || true
          docker compose -f deploy/compose/docker-compose-rag-server.yaml down -v --remove-orphans --rmi local || true
          docker compose -f deploy/compose/vectordb.yaml down -v --remove-orphans --rmi local || true
          docker ps -a || true
