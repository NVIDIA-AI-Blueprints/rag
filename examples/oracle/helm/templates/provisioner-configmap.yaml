{{- if and (eq .Values.oracle.mode "create") .Values.oracle.createDatabase.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: oracle-adb-provisioner
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  provision_adb.py: |
{{ .Files.Get "files/provision_adb.py" | indent 4 }}
{{- end }}
