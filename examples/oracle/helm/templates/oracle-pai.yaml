{{- /*
  Oracle Private AI Services Container — gpu-index variant.

  Provides cuVS-backed GPU offload for Oracle 26ai vector index builds. The
  database calls POST /v1/index over HTTP/2 during CREATE VECTOR INDEX, the
  container runs the HNSW/IVF graph build on a GPU, and streams the result
  back. Embedding NIM, retrieval, and the rag-server request path are
  unaffected — this is a side service to the database.

  Gated by oracle.gpuIndexOffload.enabled. Default true; the index is built
  on the GPU automatically.
*/ -}}
{{- if and (hasKey .Values "oracle") (default false .Values.oracle.gpuIndexOffload.enabled) }}
{{- $g := .Values.oracle.gpuIndexOffload -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oracle-pai-gpu-index
  labels:
    app.kubernetes.io/name: oracle-pai-gpu-index
    app.kubernetes.io/component: vector-index-offload
    app.kubernetes.io/part-of: nvidia-rag-oracle
    backend: cuvs
spec:
  # Use a kindIs check instead of `default 1` so an explicit 0 (operator
  # scaling the workload to zero for cost or maintenance) is honoured.
  # Helm's `default` treats 0 as empty for numeric values and replaces
  # it with the default — so `default 1 0` returns 1, not 0.
  replicas: {{ if hasKey $g "replicaCount" }}{{ $g.replicaCount }}{{ else }}1{{ end }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: oracle-pai-gpu-index
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oracle-pai-gpu-index
        app.kubernetes.io/component: vector-index-offload
        app.kubernetes.io/part-of: nvidia-rag-oracle
        backend: cuvs
    spec:
      imagePullSecrets:
        - name: {{ .Values.oracle.containerRegistry.name | default "oracle-pull-secret" | quote }}
      {{- with $g.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $g.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
      containers:
        - name: pai
          image: {{ printf "%s:%s" $g.image.repository $g.image.tag | quote }}
          imagePullPolicy: {{ $g.image.pullPolicy | default "IfNotPresent" | quote }}
          ports:
            - name: http
              containerPort: {{ default 8080 $g.service.port }}
              protocol: TCP
          env:
            - name: PRIVATE_AI_HTTPS_ENABLED
              value: {{ ternary "true" "false" (default false $g.https) | quote }}
            - name: PRIVATE_AI_AUTHENTICATION_ENABLED
              value: {{ ternary "true" "false" (default false $g.auth) | quote }}
            - name: PRIVATE_AI_LOG_STDOUT_ENABLED
              value: "true"
            - name: PRIVATE_AI_GPU_MODE
              value: {{ default "FORCE" $g.gpuMode | quote }}
            - name: PRIVATE_AI_CONTAINER_ID_PREFIX
              value: {{ printf "%s-" .Release.Name | quote }}
            {{- with $g.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with $g.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /privateai/logs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
# Two Services on purpose:
#
#  1. oracle-pai-gpu-index           — OCI internal LoadBalancer. This is the
#     URL Oracle ADB dials. ADB is a managed OCI service in your VCN; it has
#     no access to cluster.local DNS or ClusterIP ranges, so ClusterIP would
#     not work. The internal LoadBalancer gets a stable VCN-routable IP from
#     the OKE service-LB subnet.
#
#  2. oracle-pai-gpu-index-internal  — ClusterIP. Used by the post-install
#     verify Job and by any in-cluster tooling that wants to hit /health
#     before the LoadBalancer has finished provisioning.
apiVersion: v1
kind: Service
metadata:
  name: oracle-pai-gpu-index
  labels:
    app.kubernetes.io/name: oracle-pai-gpu-index
    app.kubernetes.io/component: vector-index-offload
    app.kubernetes.io/part-of: nvidia-rag-oracle
  {{- if eq (default "LoadBalancer" $g.service.type) "LoadBalancer" }}
  annotations:
    {{- $internal := true }}
    {{- if hasKey $g.service "internal" }}
      {{- $internal = $g.service.internal }}
    {{- end }}
    {{- if $internal }}
    service.beta.kubernetes.io/oci-load-balancer-internal: "true"
    {{- end }}
    {{- with $g.service.shape }}
    service.beta.kubernetes.io/oci-load-balancer-shape: {{ . | quote }}
    {{- end }}
    {{- with $g.service.subnetId }}
    service.beta.kubernetes.io/oci-load-balancer-subnet1: {{ . | quote }}
    {{- end }}
    {{- with $g.service.nsgIds }}
    oci.oraclecloud.com/oci-network-security-groups: {{ . | join "," | quote }}
    {{- end }}
    {{- with $g.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  type: {{ default "LoadBalancer" $g.service.type }}
  {{- if eq (default "LoadBalancer" $g.service.type) "LoadBalancer" }}
  externalTrafficPolicy: Cluster
  {{- end }}
  selector:
    app.kubernetes.io/name: oracle-pai-gpu-index
  ports:
    - name: http
      port: {{ default 8080 $g.service.port }}
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: oracle-pai-gpu-index-internal
  labels:
    app.kubernetes.io/name: oracle-pai-gpu-index
    app.kubernetes.io/component: vector-index-offload
    app.kubernetes.io/part-of: nvidia-rag-oracle
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: oracle-pai-gpu-index
  ports:
    - name: http
      port: {{ default 8080 $g.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
