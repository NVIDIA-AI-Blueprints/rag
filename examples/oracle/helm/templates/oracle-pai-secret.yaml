{{- /*
  Auto-creates a docker-registry secret for container-registry.oracle.com so
  the PAI Deployment can pull its image. Mirrors how `imagePullSecret` is
  materialized for nvcr.io. Skip if you bring your own pull secret with the
  matching `name`.
*/ -}}
{{- if and (hasKey .Values "oracle") (default false .Values.oracle.gpuIndexOffload.enabled) (default false .Values.oracle.containerRegistry.create) }}
{{- $cr := .Values.oracle.containerRegistry -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $cr.name | default "oracle-pull-secret" | quote }}
  labels:
    app.kubernetes.io/part-of: nvidia-rag-oracle
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {"auths":{"{{ $cr.server }}":{"username":{{ $cr.username | quote }},"password":{{ $cr.password | quote }},"auth":"{{ printf "%s:%s" $cr.username $cr.password | b64enc }}"}}}
{{- end }}
